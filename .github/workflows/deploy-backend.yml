name: Deploy backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy.sh'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          # VPS_DEPLOY_KEY is restricted server-side (authorized_keys forced
          # command) to only ever run deploy.sh, regardless of what's sent
          # here — this script value is unused but required by the action.
          script: /home/Saw_Yun_LLC/deploy.sh
